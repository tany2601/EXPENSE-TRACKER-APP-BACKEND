name: Deploy Rupexo API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy API
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd /var/www/paperlighttech/rupexo-backend

            git fetch origin
            git reset --hard origin/main

            npm install
            npm run build

            pm2 restart rupexo-api || pm2 start dist/main.js --name rupexo-api